<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 960" role="img" aria-label="HUCK architecture flowchart with Vapi and InsForge">
  <title>HUCK - Vapi + InsForge Hackathon Architecture</title>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="960" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="44" font-weight="800" fill="#0f172a">HUCK</text>
  <text x="700" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#475569">Voice-First Freight Dispatch � Multimodal AI Hackathon</text>

  <!-- Partner badges -->
  <g transform="translate(390, 118)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="72" rx="14" fill="#000714"/>
    <path d="M28 48V26l7 12 7-12 7 12 7-12v22" stroke="#62F6B5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="68" y="40" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#FFFAEB">Vapi</text>
    <text x="68" y="58" font-family="system-ui,sans-serif" font-size="13" fill="#62F6B5">Voice AI � Tool Calling � Webhooks</text>

    <rect x="320" y="0" width="300" height="72" rx="14" fill="#111827"/>
    <image href="https://insforge.dev/badge-made-with-insforge-dark.svg" x="336" y="18" width="196" height="36"/>
  </g>

  <!-- Step helper -->
  <g font-family="system-ui,sans-serif" font-weight="800" font-size="16" fill="#ffffff">
    <!-- step circles drawn per node below -->
  </g>

  <!-- STEP 1 -->
  <circle cx="420" cy="268" r="22" fill="#059669"/>
  <text x="420" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#fff">1</text>
  <g transform="translate(460, 228)" filter="url(#shadow)">
    <rect width="320" height="80" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
    <text x="160" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#065f46">HUCK Dashboard</text>
    <text x="160" y="58" text-anchor="middle" font-size="14" fill="#047857">Rank loads � Live map � Click Negotiate</text>
  </g>

  <line x1="700" y1="308" x2="700" y2="338" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="648" y="312" width="104" height="22" rx="11" fill="#f1f5f9"/>
  <text x="700" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">READ</text>

  <!-- STEP 2 -->
  <circle cx="420" cy="378" r="22" fill="#4f46e5"/>
  <text x="420" y="384" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">2</text>
  <g transform="translate(460, 338)" filter="url(#shadow)">
    <rect width="320" height="88" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="160" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#312e81">InsForge Postgres</text>
    <text x="160" y="58" text-anchor="middle" font-size="14" fill="#4338ca">loads � drivers � call_logs � spot_rates</text>
    <text x="160" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#6366f1">@insforge/sdk � createAdminClient</text>
  </g>

  <line x1="700" y1="426" x2="700" y2="456" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="628" y="430" width="144" height="22" rx="11" fill="#f1f5f9"/>
  <text x="700" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">DISPATCH</text>

  <!-- STEP 3 -->
  <circle cx="420" cy="506" r="22" fill="#000714" stroke="#62F6B5" stroke-width="2"/>
  <text x="420" y="512" text-anchor="middle" font-size="18" font-weight="800" fill="#62F6B5">3</text>
  <g transform="translate(460, 456)" filter="url(#shadow)">
    <rect width="320" height="88" rx="14" fill="#000714" stroke="#62F6B5" stroke-width="3"/>
    <path d="M24 58V38l6 11 6-11 6 11 6-11v20" stroke="#62F6B5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <text x="170" y="40" text-anchor="middle" font-size="20" font-weight="800" fill="#FFFAEB">VAPI Voice Agent</text>
    <text x="170" y="62" text-anchor="middle" font-size="14" fill="#62F6B5">GPT-4o � outbound PSTN call</text>
    <text x="170" y="80" text-anchor="middle" font-size="13" fill="#0BD8B6">accept_load � defer_to_team � log_broker_offer</text>
  </g>

  <!-- Broker -->
  <g transform="translate(860, 464)" filter="url(#shadow)">
    <rect width="220" height="72" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <text x="110" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Broker Phone</text>
    <text x="110" y="58" text-anchor="middle" font-size="14" fill="#64748b">You role-play the broker</text>
  </g>
  <line x1="780" y1="500" x2="860" y2="500" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="790" y="476" width="60" height="22" rx="11" fill="#fef3c7"/>
  <text x="820" y="491" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">LIVE</text>

  <!-- STEP 4 webhooks split -->
  <circle cx="280" cy="648" r="22" fill="#000714" stroke="#0BD8B6" stroke-width="2"/>
  <text x="280" y="654" text-anchor="middle" font-size="18" font-weight="800" fill="#0BD8B6">4</text>
  <g transform="translate(320, 600)" filter="url(#shadow)">
    <rect width="300" height="96" rx="14" fill="#000714" stroke="#0BD8B6" stroke-width="3"/>
    <text x="150" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#FFFAEB">/api/vapi-webhook</text>
    <text x="150" y="58" text-anchor="middle" font-size="14" fill="#62F6B5">Tool calls during the call</text>
    <text x="150" y="78" text-anchor="middle" font-size="13" fill="#0BD8B6">log_broker_offer � accept_load</text>
  </g>

  <circle cx="1120" cy="648" r="22" fill="#000714" stroke="#0BD8B6" stroke-width="2"/>
  <text x="1120" y="654" text-anchor="middle" font-size="18" font-weight="800" fill="#0BD8B6">5</text>
  <g transform="translate(780, 600)" filter="url(#shadow)">
    <rect width="300" height="96" rx="14" fill="#000714" stroke="#0BD8B6" stroke-width="3"/>
    <text x="150" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#FFFAEB">/api/vapi-status</text>
    <text x="150" y="58" text-anchor="middle" font-size="14" fill="#62F6B5">End-of-call report</text>
    <text x="150" y="78" text-anchor="middle" font-size="13" fill="#0BD8B6">analysis.structuredData</text>
  </g>

  <!-- arrows to webhooks -->
  <path d="M620 544 L480 600" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M780 544 L980 600" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M970 500 L1050 544" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- STEP 6 write -->
  <circle cx="700" cy="778" r="22" fill="#4f46e5"/>
  <text x="700" y="784" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">6</text>
  <g transform="translate(540, 738)" filter="url(#shadow)">
    <rect width="320" height="80" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="160" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#312e81">InsForge Write</text>
    <text x="160" y="58" text-anchor="middle" font-size="14" fill="#4338ca">final_rate � broker offer � outcome � transcript</text>
  </g>
  <line x1="470" y1="696" x2="580" y2="738" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="696" x2="820" y2="738" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- STEP 7 confirmed -->
  <circle cx="700" cy="888" r="22" fill="#059669"/>
  <text x="700" y="894" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">7</text>
  <g transform="translate(460, 848)" filter="url(#shadow)">
    <rect width="480" height="72" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
    <text x="240" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#065f46">Confirmed Deal on HUCK</text>
    <text x="240" y="58" text-anchor="middle" font-size="15" fill="#047857">Map updates � Gemini summary � revenue saved</text>
  </g>
  <line x1="700" y1="818" x2="700" y2="848" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Four modalities bar -->
  <rect x="60" y="848" width="360" height="72" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="80" y="874" font-size="13" font-weight="800" fill="#64748b">FOUR MODALITIES</text>
  <text x="80" y="898" font-size="13" fill="#334155">Vision � Data � Voice � Text</text>
  <text x="80" y="914" font-size="11" fill="#64748b">Screenshot � Spot rate � Vapi � Gemini</text>

  <!-- Footer -->
  <text x="700" y="948" text-anchor="middle" font-size="16" font-weight="700" fill="#059669">Dispatchers negotiate for hours. HUCK closes deals in 60 seconds.</text>
</svg>
