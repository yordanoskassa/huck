<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-label="HUCK system design architecture diagram">
  <title>HUCK System Design</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f8fafc"/>

  <!-- Title block -->
  <text x="700" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#0f172a">HUCK  System Design</text>
  <text x="700" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Layered architecture · Next.js BFF · InsForge backend · Vapi voice pipeline</text>

  <!-- PPP LAYER 1: CLIENT PPP -->
  <rect x="40" y="90" width="1320" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">CLIENT TIER</text>

  <g font-family="system-ui,sans-serif">
    <rect x="60" y="128" width="150" height="56" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="135" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">HUCK Dashboard</text>
    <text x="135" y="168" text-anchor="middle" font-size="10" fill="#047857">/ · map · negotiate</text>

    <rect x="230" y="128" width="130" height="56" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="295" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Motive (sim)</text>
    <text x="295" y="168" text-anchor="middle" font-size="10" fill="#3b82f6">Fleet · HOS · ELD</text>

    <rect x="380" y="128" width="130" height="56" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="445" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">DAT (sim)</text>
    <text x="445" y="168" text-anchor="middle" font-size="10" fill="#3b82f6">Load board sync</text>

    <rect x="530" y="128" width="130" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="595" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Upload</text>
    <text x="595" y="168" text-anchor="middle" font-size="10" fill="#b45309">Vision · screenshots</text>

    <rect x="680" y="128" width="120" height="56" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="740" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Calls / Map</text>
    <text x="740" y="168" text-anchor="middle" font-size="10" fill="#64748b">History views</text>

    <rect x="820" y="128" width="520" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="840" y="152" font-size="11" font-weight="600" fill="#475569">Browser client</text>
    <text x="840" y="170" font-size="10" fill="#64748b">React 19 · Tailwind · Leaflet maps · @insforge/sdk (client reads)</text>
  </g>

  <!-- Arrow client to app -->
  <line x1="700" y1="200" x2="700" y2="228" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="720" y="222" font-size="10" fill="#64748b">HTTPS / REST</text>

  <!-- PPP LAYER 2: APPLICATION PPP -->
  <rect x="40" y="230" width="1320" height="280" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="56" y="252" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#059669" letter-spacing="1">APPLICATION TIER  Next.js 16 (App Router + API Routes)</text>

  <!-- Pages -->
  <rect x="60" y="268" width="280" height="220" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="76" y="288" font-size="11" font-weight="700" fill="#166534">UI Pages (SSR/CSR)</text>
  <text x="76" y="310" font-size="10" fill="#15803d">page.tsx · motive · loadboard</text>
  <text x="76" y="328" font-size="10" fill="#15803d">upload · calls · login</text>
  <text x="76" y="354" font-size="10" fill="#64748b">Components:</text>
  <text x="76" y="372" font-size="10" fill="#64748b">HuckFleetMap · dispatch UI</text>

  <!-- API BFF -->
  <rect x="360" y="268" width="420" height="220" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="376" y="288" font-size="11" font-weight="700" fill="#334155">API Layer (BFF / Webhooks)</text>
  <text x="376" y="312" font-size="10" fill="#475569">POST /api/dispatch-single  initiate Vapi call</text>
  <text x="376" y="330" font-size="10" fill="#475569">POST /api/assign-drivers  rank + assign fleet</text>
  <text x="376" y="348" font-size="10" fill="#475569">POST /api/vapi-webhook  tool calls (sync)</text>
  <text x="376" y="366" font-size="10" fill="#475569">POST /api/vapi-status  end-of-call report</text>
  <text x="376" y="384" font-size="10" fill="#475569">POST /api/summarize-call  Gemini analysis</text>
  <text x="376" y="402" font-size="10" fill="#475569">POST /api/parse-image  vision extraction</text>
  <text x="376" y="420" font-size="10" fill="#475569">POST /api/clear-demo · collect-listings</text>
  <text x="376" y="444" font-size="10" fill="#64748b">GET loads · drivers · call-logs</text>

  <!-- Domain logic -->
  <rect x="800" y="268" width="540" height="220" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="816" y="288" font-size="11" font-weight="700" fill="#92400e">Domain Logic (lib/)</text>
  <text x="816" y="312" font-size="10" fill="#78350f">rate-engine.ts  accept vs negotiate strategy</text>
  <text x="816" y="330" font-size="10" fill="#78350f">assign-drivers  equipment · deadhead · HOS</text>
  <text x="816" y="348" font-size="10" fill="#78350f">vapi-utils.ts  tool parse · structured data</text>
  <text x="816" y="366" font-size="10" fill="#78350f">demo-seed.ts  reset demo state</text>
  <text x="816" y="394" font-size="10" font-weight="600" fill="#92400e">Vapi tool handlers:</text>
  <text x="816" y="412" font-size="10" fill="#78350f">accept_load · defer_to_team · log_broker_offer</text>
  <text x="816" y="430" font-size="10" fill="#78350f">make_counter_offer · log_call_outcome</text>

  <!-- PPP LAYER 3: DATA + EXTERNAL PPP -->
  <line x1="400" y1="510" x2="400" y2="548" stroke="#6366f1" stroke-width="2" marker-end="url(#arr-d)"/>
  <line x1="900" y1="510" x2="900" y2="548" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- InsForge -->
  <rect x="40" y="550" width="620" height="300" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="56" y="572" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4338ca" letter-spacing="1">DATA TIER  InsForge (Postgres BaaS)</text>
  <image href="https://insforge.dev/badge-made-with-insforge.svg" x="480" y="552" width="168" height="30"/>

  <rect x="60" y="590" width="260" height="240" rx="6" fill="#ffffff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="76" y="612" font-size="11" font-weight="700" fill="#312e81">Core Tables</text>
  <text x="76" y="634" font-size="10" fill="#4338ca">drivers  fleet location, HOS, equipment</text>
  <text x="76" y="652" font-size="10" fill="#4338ca">loads  lanes, rates, broker, status</text>
  <text x="76" y="670" font-size="10" fill="#4338ca">spot_rates  market benchmarks per lane</text>
  <text x="76" y="688" font-size="10" fill="#4338ca">call_logs  transcripts, outcomes, rates</text>
  <text x="76" y="706" font-size="10" fill="#4338ca">accepted_loads  confirmed deals</text>
  <text x="76" y="724" font-size="10" fill="#4338ca">image_uploads  parsed screenshot data</text>

  <rect x="340" y="590" width="300" height="240" rx="6" fill="#ffffff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="356" y="612" font-size="11" font-weight="700" fill="#312e81">InsForge Services</text>
  <text x="356" y="634" font-size="10" fill="#4338ca">PostgreSQL + RLS policies</text>
  <text x="356" y="652" font-size="10" fill="#4338ca">Google OAuth (auth.users)</text>
  <text x="356" y="670" font-size="10" fill="#4338ca">Object storage (screenshots)</text>
  <text x="356" y="688" font-size="10" fill="#4338ca">OpenRouter AI gateway (vision)</text>
  <text x="356" y="712" font-size="10" fill="#64748b">SDK: createClient (browser)</text>
  <text x="356" y="728" font-size="10" fill="#64748b">SDK: createAdminClient (API routes)</text>
  <text x="356" y="752" font-size="10" fill="#64748b">Project: multimodal · us-east</text>

  <!-- External services -->
  <rect x="680" y="550" width="680" height="300" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="696" y="572" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">EXTERNAL SERVICES</text>

  <!-- Vapi box -->
  <rect x="700" y="590" width="300" height="130" rx="6" fill="#000714" stroke="#62F6B5" stroke-width="2"/>
  <path d="M716 660V628l6 11 6-11 6 11 6-11v32" stroke="#62F6B5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <text x="820" y="624" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFAEB">Vapi</text>
  <text x="820" y="644" text-anchor="middle" font-size="10" fill="#62F6B5">Voice AI platform</text>
  <text x="820" y="662" text-anchor="middle" font-size="10" fill="#62F6B5">GPT-4o assistant · PSTN outbound</text>
  <text x="820" y="678" text-anchor="middle" font-size="10" fill="#62F6B5">Tool calling · analysisPlan schema</text>
  <text x="820" y="698" text-anchor="middle" font-size="10" fill="#0BD8B6">Webhooks ’ Next.js API routes</text>

  <!-- Gemini -->
  <rect x="1020" y="590" width="160" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1100" y="616" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Gemini 2.0</text>
  <text x="1100" y="634" text-anchor="middle" font-size="10" fill="#15803d">Transcript summary</text>

  <!-- OpenRouter -->
  <rect x="1200" y="590" width="140" height="60" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1270" y="616" text-anchor="middle" font-size="12" font-weight="700" fill="#6b21a8">OpenRouter</text>
  <text x="1270" y="634" text-anchor="middle" font-size="10" fill="#9333ea">Vision / parse-image</text>

  <!-- Broker PSTN -->
  <rect x="1020" y="670" width="320" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1180" y="696" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Broker Phone (PSTN)</text>
  <text x="1180" y="714" text-anchor="middle" font-size="10" fill="#64748b">Live negotiation · demo role-play</text>

  <!-- Vapi to broker -->
  <line x1="1000" y1="655" x2="1020" y2="700" stroke="#62F6B5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="850" y1="720" x2="1020" y2="700" stroke="#62F6B5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Legend -->
  <rect x="700" y="750" width="640" height="88" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="716" y="772" font-size="11" font-weight="700" fill="#475569">KEY FLOWS</text>
  <text x="716" y="792" font-size="10" fill="#64748b">` User clicks Negotiate ’ BFF reads InsForge ’ POST api.vapi.ai/call</text>
  <text x="716" y="808" font-size="10" fill="#64748b">a Vapi invokes tools mid-call ’ /api/vapi-webhook ’ InsForge writes call_logs</text>
  <text x="716" y="824" font-size="10" fill="#64748b">b Call ends ’ /api/vapi-status ’ structuredData + /api/summarize-call ’ Confirmed tab</text>

  <!-- Footer -->
  <text x="700" y="878" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Deploy: Next.js on Vercel · Webhooks via ngrok or public URL · InsForge cloud backend</text>
</svg>
